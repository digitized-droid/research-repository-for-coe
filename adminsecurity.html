// ================= LOAD CURRENT USER NAME =================
async function loadCurrentUser() {
  const { data: { user } } = await supabaseClient.auth.getUser();

  if (!user) {
    document.getElementById("user-info").textContent = "Not logged in";
    return;
  }

  const { data: profile, error } = await supabaseClient
    .from("profiles")
    .select("display_name, role")
    .eq("user_id", user.id)
    .single();

  if (error || !profile) {
    document.getElementById("user-info").textContent = "User";
    return;
  }

  // 🔥 PRIORITY: display_name → fallback to role
  let name = profile.display_name;

  if (!name || name.trim() === "") {
    name = profile.role === "admin" ? "Admin" : "User";
  }

  document.getElementById("user-info").textContent =
    `Hello, ${name}`;
}

// =======================
// PAGINATION VARIABLES
// =======================
let currentPage = 1;
const rowsPerPage = 10;
let allStudents = [];
let isCollapsed = false;
let allUsers = [];
let currentStudentView = [];

// =======================
// AUTH CHECK (ADMIN ONLY)
// =======================
async function checkAdmin() {
  const { data: { user } } = await supabaseClient.auth.getUser();

  if (!user) {
    alert("Not logged in");
    window.location.href = "index.html";
    return;
  }

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", user.id) // ✅ FIXED HERE
    .single();

  if (!profile || profile.role !== "admin") {
    alert("Access denied. Admins only.");
    window.location.href = "index.html";
  }
}


// =======================
// LOAD STUDENTS
// =======================
async function loadStudents() {
  const { data, error } = await supabaseClient
    .from("students_masterlist")
    .select("*")
    .order("student_number", { ascending: false }); // ✅ DESCENDING

  if (error) {
    console.error(error);
    alert("Error loading students");
    return;
  }

  allStudents = data;
currentStudentView = allStudents;
currentPage = 1;
renderTable(currentStudentView);
}

// =======================
// RENDER TABLE (PAGINATION)
// =======================
function renderTable(data = allStudents) {
  const tbody = document.querySelector("#studentsTable tbody");
  tbody.innerHTML = "";

  const start = (currentPage - 1) * rowsPerPage;
  const end = start + rowsPerPage;
  const pageData = data.slice(start, end);

  pageData.forEach(student => {
   const row = `
  <tr>
    <td contenteditable="true" spellcheck="false"
    style="background:#fff8dc; cursor:text;"
    onblur="updateStudent('${student.id}', 'student_number', this.innerText)">
  ${student.student_number}
</td>

    <td contenteditable="true"
        onblur="updateStudent('${student.id}', 'full_name', this.innerText)">
      ${student.full_name}
    </td>

    <td>${student.is_registered}</td>

    <td>
      <button onclick="deleteStudent('${student.id}')">Delete</button>
    </td>
  </tr>
`;
    tbody.innerHTML += row;
  });

  // Page info
  const total = data.length;
  const pageInfo = document.getElementById("pageInfo");

  pageInfo.innerText =
    `Page ${currentPage} (${start + 1}-${Math.min(end, total)} of ${total})`;
}

function filterStudents() {
  const keyword = document.getElementById("studentSearch").value.toLowerCase();

  currentStudentView = allStudents.filter(student =>
    student.student_number.toLowerCase().includes(keyword) ||
    student.full_name.toLowerCase().includes(keyword)
  );

  currentPage = 1;
  renderTable(currentStudentView);
}

// =======================
// PAGINATION CONTROLS
// =======================
function nextPage() {
  if (currentPage * rowsPerPage < currentStudentView.length) {
    currentPage++;
    renderTable(currentStudentView);
  }
}

function prevPage() {
  if (currentPage > 1) {
    currentPage--;
    renderTable(currentStudentView);
  }
}

// =======================

async function loadUsers() {

    alert("Error loading users");

async function updateUser(id, field, value) {

  if (field === "role") {
    value = value.toLowerCase();
  }

  const { error } = await supabaseClient
    .from("profiles")
    .update({ role: value })
    .eq("id", id);

  if (error) {
    alert("Update failed: " + error.message);
  } else {
    console.log("Role updated:", value);
  }
}


//Delete function
async function deleteUser(id) {
  if (!confirm("Delete user?")) return;

  const { error } = await supabaseClient
    .from("profiles")
    .delete()
    .eq("id", id);

  if (error) {
    alert("Delete failed: " + error.message);
    return;
  }

  await loadUsers();
}


async function updateStudent(id, field, value) {
  const { error } = await supabaseClient
    .from("students_masterlist")
    .update({ [field]: value.trim() })
    .eq("id", id);

  if (error) {
    alert("Update failed: " + error.message);
  } else {
    console.log("Updated:", field, value);
  }
}

// =======================
// ADD STUDENT
// =======================
async function addStudent() {
  const student_number = document.getElementById("new_student_number").value.trim();
  const full_name = document.getElementById("new_full_name").value.trim();

  if (!student_number || !full_name) {
    alert("Fill all fields");
    return;
  }

  const { error } = await supabaseClient
    .from("students_masterlist")
    .insert({
      student_number,
      full_name,
      is_registered: false
    });

  if (error) {
    alert(error.message);
    return;
  }

  document.getElementById("new_student_number").value = "";
  document.getElementById("new_full_name").value = "";

  loadStudents();
}

async function batchAddStudents() {
  const raw = document.getElementById("batchInput").value.trim();

  if (!raw) {
    alert("Paste student list first.");
    return;
  }

  const lines = raw.split("\n");

  const studentsToInsert = [];
  const errors = [];

  lines.forEach((line, index) => {
    const clean = line.trim();

    if (!clean) return;

    // Split using "/"
    const parts = clean.split("/");

    if (parts.length !== 2) {
      errors.push(`Line ${index + 1}: Invalid format (use / separator)`);
      return;
    }

    const student_number = parts[0].trim();
    const full_name = parts[1].trim();

    // Validation
    if (!student_number || !full_name) {
      errors.push(`Line ${index + 1}: Missing data`);
      return;
    }

    studentsToInsert.push({
      student_number,
      full_name,
      is_registered: false
    });
  });

  if (errors.length > 0) {
    alert("Errors found:\n" + errors.join("\n"));
    return;
  }

  const { error } = await supabaseClient
    .from("students_masterlist")
    .insert(studentsToInsert);

  if (error) {
    alert(error.message);
    return;
  }

  alert("Batch upload successful!");

  document.getElementById("batchInput").value = "";

  loadStudents();
}

  const { error } = await supabaseClient

  if (error) {
    alert(error.message);
    return;
  }

  loadStudents();
}

async function showSection(section) {
  // Hide all sections
  document.querySelectorAll(".section").forEach(sec => {
    sec.classList.remove("active");
  });

  // Remove active menu highlight
  document.querySelectorAll(".menu li").forEach(item => {
    item.classList.remove("active");
  });

if (section === "users") {
  document.getElementById("usersSectionUI").classList.add("active");
  document.querySelectorAll(".menu li")[0].classList.add("active");
  await loadUsers();     // ✅ WAIT
} else {
  document.getElementById("studentsSectionUI").classList.add("active");
  document.querySelectorAll(".menu li")[1].classList.add("active");
  await loadStudents();  // ✅ WAIT
}
}

function renderUsers(data) {
  const tbody = document.querySelector("#usersTable tbody");

  tbody.innerHTML = "";

  data.forEach(user => {
    const row = `
      <tr>
        <td>${user.student_number}</td>
        <td>${user.full_name}</td>
        <td>${user.email}</td>
        <td>${user.phone || ""}</td>
        <td>
          <select onchange="updateUser('${user.id}', 'role', this.value)">
            <option value="user" ${user.role === "user" ? "selected" : ""}>user</option>
            <option value="admin" ${user.role === "admin" ? "selected" : ""}>admin</option>
          </select>
        </td>
        <td>
          <button onclick="deleteUser('${user.id}')">Delete</button>
        </td>
      </tr>
    `;
    tbody.innerHTML += row;
  });
}
function filterUsers() {
  const keyword = document.getElementById("userSearch").value.toLowerCase();

  const filtered = allUsers.filter(user =>
    (user.student_number || "").toLowerCase().includes(keyword) ||
    (user.full_name || "").toLowerCase().includes(keyword) ||
    (user.email || "").toLowerCase().includes(keyword)
  );

  renderUsers(filtered);
}

// =======================
// INIT
// =======================
async function init() {
  await checkAdmin();
  await loadCurrentUser();
  await loadUsers();  // load once
}

document.addEventListener("DOMContentLoaded", async () => {
  await init();
});

});
